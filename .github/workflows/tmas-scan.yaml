name: TMAS Scan

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  tmas-scan:
    name: TMAS Repo Scan
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Download TMAS and Scan Repo for Open Source Vulnerabilities and Secrets
        uses: trendmicro/tmas-scan-action@v1
        with:
          version: '2'                      # v2系推奨
          vulnerabilitiesScan: true
          malwareScan: true
          secretsScan: true
          artifact: dir:./repo              # ↑ checkout の path と合わせる
          additionalArgs: --region=ap-northeast-1
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      # （任意）道具確認
      - name: Check tools
        run: |
          curl --version
          jq --version
