name: TMAS Scan

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  tmas-scan:
    name: TMAS Repo Scan
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Sanity check - list files
        run: |
          echo "=== 現在のディレクトリ ==="
          pwd
          ls -la
          echo "=== ./repo の中身 ==="
          ls -la ./repo

      # TMAS をインストール＆実行する公式アクション
      - name: Download TMAS and Scan Repo with TMAS Action
        id: tmas_action
        uses: trendmicro/tmas-scan-action@main
        with:
          version: '2'                        # TMAS CLI のメジャー
          vulnerabilitiesScan: true           # SAST
          malwareScan: false                   # マルウェア（EICAR）
          secretsScan: true                   # シークレット
          artifact: dir:./repo                # ← checkout と一致
          additionalArgs: --region=ap-northeast-1
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      # 手動で CLI を叩いて詳細エラーを出す（原因特定用）
      - name: Manual TMAS scan test
        env:
          TMAS_API_KEY: ${{ secrets.TMAS_API_KEY }}   # ← ここが超重要
        run: |
          echo "=== Manual TMAS scan start ==="
          echo "API KEY length: ${#TMAS_API_KEY}"     # 0ならSecrets未設定
          # CLI 仕様どおりに実行（-VMS と --region を使用）
          tmas scan dir ./repo -V -M -S --region=ap-northeast-1 -v
          echo "=== Manual TMAS scan end ==="

      - name: Check tools
        run: |
          curl --version
          jq --version
