name: TMAS Scan

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  tmas-scan:
    name: TMAS Repo Scan
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Sanity check - list files
        run: |
          echo "=== 現在のディレクトリ ==="
          pwd
          ls -la

          echo "=== ./repo の中身 ==="
          ls -la ./repo

      # ▼ TMAS Action（インストール＋スキャン）
      - name: Download TMAS and Scan Repo with TMAS Action
        id: tmas_action
        uses: trendmicro/tmas-scan-action@main
        with:
          version: '2'
          vulnerabilitiesScan: true
          malwareScan: true
          secretsScan: true
          artifact: dir:./repo
          additionalArgs: --region=ap-northeast-1
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      # ▼ TMAS のインストールが終わったあとに手動スキャンを実行する
      - name: Manual TMAS scan test
        if: always()
        run: |
          echo "=== Manual TMAS scan start ==="
          echo "Using API KEY length:"
          echo ${#TMAS_API_KEY}

          # 実行（TMAS インストールは前の Action が済ませている）
          tmas scan dir ./repo \
            --region ap-northeast-1 \
            --api-key "${{ secrets.TMAS_API_KEY }}" \
            --debug

          echo "=== Manual TMAS scan end ==="

      - name: Check tools
        run: |
          curl --version
          jq --version
